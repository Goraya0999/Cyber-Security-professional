version: "3.9"

services:
  # ──────────────────────────────────────────────────────────
  # PostgreSQL Database
  # ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: dids-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dids}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dids_secret}
      POSTGRES_DB: ${POSTGRES_DB:-dids}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dids}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────────────────
  # API Server (Express)
  # ──────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: dids-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-dids}:${POSTGRES_PASSWORD:-dids_secret}@postgres:5432/${POSTGRES_DB:-dids}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required. Set it in your .env file}
      DIDS_API_KEY: ${DIDS_API_KEY:-}
      DIDS_ML_API_URL: http://ml-api:8000
      DIDS_ML_API_KEY: ${DIDS_INTERNAL_API_KEY:?DIDS_INTERNAL_API_KEY is required. Set it in your .env file}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      ml-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ──────────────────────────────────────────────────────────
  # ML API (FastAPI + Random Forest)
  # ──────────────────────────────────────────────────────────
  ml-api:
    build:
      context: .
      dockerfile: Dockerfile.ml-api
    container_name: dids-ml-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-dids}:${POSTGRES_PASSWORD:-dids_secret}@postgres:5432/${POSTGRES_DB:-dids}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required. Set it in your .env file}
      DIDS_INTERNAL_API_KEY: ${DIDS_INTERNAL_API_KEY:?DIDS_INTERNAL_API_KEY is required. Set it in your .env file}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/healthz', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ──────────────────────────────────────────────────────────
  # Frontend (React/Vite via Nginx)
  # ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        BASE_PATH: /
    container_name: dids-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local

# ──────────────────────────────────────────────────────────
# Usage:
#   cp .env.example .env      # Fill in JWT_SECRET, etc.
#   docker compose up -d      # Start all services
#   docker compose logs -f    # View logs
#   docker compose down -v    # Stop and remove volumes
# ──────────────────────────────────────────────────────────
